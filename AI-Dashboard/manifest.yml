modules:
  confluence:globalPage:
    - key: ai-dashboard-hello-world
      resource: main
      resolver:
        function: resolver
      title: AI Dashboard
      route: hello-world

  function:
    - key: resolver
      handler: index.handler

permissions:
  scopes:
    - read:jira-work
    - read:jira-user
    - read:confluence-content.all
    - read:confluence-space.summary
    - storage:app
  external:
    fetch:
      backend:
        - address: https://api.openai.com

resources:
  - key: main
    path: static/dashboard/build

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/83d30c9b-ec7c-4bf9-92ab-b7c2ae7b90f2